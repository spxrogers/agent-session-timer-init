name: Session ping (claude)

# Keeps a Claude session window warm. Thin caller — all logic is in _ping.yml.
#
# NOTE: `schedule` triggers only run from the repository's DEFAULT branch. This
# won't fire on its own until merged to main. Use "Run workflow" to test.

on:
  schedule:
    # Twice an hour at :07 and :37 (UTC). Two independent reasons for this shape:
    #   1. Off the top of the hour. `0 * * * *` is GitHub's most congested slot
    #      (everyone piles on), so scheduled runs there get delayed or dropped;
    #      odd, off-peak minutes are far more reliable.
    #   2. Doubled up. GitHub's `schedule` trigger is best-effort with no SLA and
    #      silently drops a large share of invocations under load (observed on
    #      this repo: ~half of the intended hourly runs missed, with multi-hour
    #      gaps). A second attempt 30 min later makes a fully-missed hour far less
    #      likely without changing the failure mode. Still cheap — 2 Haiku pings/
    #      hour at max_tokens:16 — and cheap is the whole point.
    - cron: "7,37 * * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Resolve config but send no request"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: ping-claude
  cancel-in-progress: false

jobs:
  ping:
    uses: ./.github/workflows/_ping.yml
    with:
      agent: claude
      provider: anthropic
      dry_run: ${{ inputs.dry_run || false }}
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      ANTHROPIC_AUTH_TOKEN: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
