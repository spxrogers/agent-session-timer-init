name: CI

# Enforces the stated correctness gate. `tsx` strips types without checking, so
# without this a type error would merge green and never surface at runtime.
# No credentials needed — the ping runs in --dry-run (no network call).

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Ping resolves (dry run)
        run: npm run ping -- --dry-run
