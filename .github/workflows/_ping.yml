name: _ping (reusable)

# Shared ping logic. Not scheduled directly — each agent has a thin caller
# workflow (ping-<agent>.yml) that sets its own schedule and calls this with
# its provider + secrets. Add an agent = add a ~15-line caller; the install,
# run, and keepalive logic lives here once.
#
# Callers MUST grant `permissions: contents: write` (the ping-*.yml callers do)
# — a reusable workflow inherits the caller's token scope, and the keepalive
# step below pushes a commit. Without it the push 403s and the keepalive no-ops.

on:
  workflow_call:
    inputs:
      agent:
        description: "Short agent id, used for labels + the .keep-alive.txt entry"
        required: true
        type: string
      provider:
        description: "PING_PROVIDER (anthropic | openai | ...)"
        required: true
        type: string
      model:
        description: "Optional PING_MODEL override; empty = provider default"
        required: false
        type: string
        default: ""
      dry_run:
        description: "Resolve config but send no request"
        required: false
        type: boolean
        default: false
    # Explicitly declared (not `secrets: inherit`) so this workflow only ever
    # sees the credentials it needs. Callers map them; all are optional and the
    # provider auto-detects which to use.
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        required: false
      ANTHROPIC_AUTH_TOKEN:
        required: false
      ANTHROPIC_API_KEY:
        required: false
      OPENAI_API_KEY:
        required: false

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      # `openai` is an optional dependency, only needed for openai/codex agents.
      - name: Install optional provider deps
        if: ${{ inputs.provider == 'openai' }}
        run: npm install --no-save openai

      - name: Send ping (${{ inputs.agent }})
        env:
          PING_PROVIDER: ${{ inputs.provider }}
          PING_MODEL: ${{ inputs.model }}
          # Pass dry_run via env, not interpolated into the shell below.
          DRY_RUN: ${{ inputs.dry_run }}
          # The selected provider uses whichever credential it needs; unset ones
          # expand to "" and are treated as absent.
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          ANTHROPIC_AUTH_TOKEN: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ "$DRY_RUN" = "true" ]; then
            npm run ping -- --dry-run
          else
            npm run ping
          fi

      # Prevents the 60-day "inactive repo" auto-disable of scheduled workflows.
      # Appends one line to ./.keep-alive.txt (agent + run id + link) only when
      # the repo has actually gone quiet, so it's a sparse log (~1 line / 45d).
      #
      # `!cancelled()` so this runs even when the ping step FAILED — the point is
      # to keep the schedule alive (e.g. while you fix an expired token), which a
      # default success()-gated step would skip, letting the workflow disable.
      #
      # Usually the first agent to run in a quiet stretch resets the timer and the
      # others skip; if two enabled agents genuinely race, the rebase-retry below
      # absorbs the non-fast-forward push.
      - name: Keep the schedule alive
        if: ${{ !cancelled() && github.event_name == 'schedule' }}
        env:
          AGENT: ${{ inputs.agent }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          THRESHOLD_DAYS=45
          LAST=$(git log -1 --format=%ct 2>/dev/null || echo 0)
          NOW=$(date +%s)
          AGE_DAYS=$(( (NOW - LAST) / 86400 ))
          echo "Days since last commit: $AGE_DAYS (threshold: $THRESHOLD_DAYS)"
          if [ "$AGE_DAYS" -lt "$THRESHOLD_DAYS" ]; then
            echo "Repo active recently — no keepalive commit needed."
            exit 0
          fi
          STAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          printf '%s  agent=%s  run=%s  %s\n' "$STAMP" "$AGENT" "$GITHUB_RUN_ID" "$RUN_URL" >> .keep-alive.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .keep-alive.txt
          git commit -m "chore(${AGENT}): keepalive [skip ci]"
          # Best-effort push; absorb a concurrent keepalive from another agent.
          for attempt in 1 2 3; do
            git push && exit 0
            echo "push rejected (attempt ${attempt}) — rebasing on remote and retrying"
            git pull --rebase origin "${GITHUB_REF_NAME}" || true
          done
          echo "::warning::keepalive push still failing after retries; another agent likely won the race"
